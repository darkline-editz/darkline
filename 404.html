<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 | Dark Line</title>
<meta name="robots" content="noindex">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Teko:wght@600&family=JetBrains+Mono:wght@400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#0a0a0a; color:#e9e7e2;
    min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:'JetBrains Mono', monospace; text-align:center; gap:20px;
  }
  h1{font-family:'Teko'; font-size:clamp(80px,20vw,220px); color:#e10600; line-height:0.9;}
  p{color:#6b6f76; font-size:14px; letter-spacing:0.08em;}
  a{
    margin-top:10px; display:inline-block;
    padding:14px 28px; border:1px solid #e9e7e2; color:#e9e7e2; text-decoration:none;
    font-size:12px; letter-spacing:0.1em; text-transform:uppercase;
    transition:all .2s ease;
  }
  a:hover{background:#e10600; border-color:#e10600;}
</style>
</head>
<body>
  <h1>404</h1>
  <p>// off the line — page not found</p>
  <a href="/">Back to Dark Line</a>
</body>
</html>
